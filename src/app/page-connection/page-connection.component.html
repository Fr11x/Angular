<main>
    <div class="container">
        <div class="form-inscription">
            <h3>Formulaire de connection</h3>
            <form>
                <div class="mb-3">
                    <label for="e-mail" class="form-label">Adresse mail:</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe:</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-violet">Se connecter</button>
                <p class="mt-3">Vous ne possédez pas de compte ? <a class="nav-link active" aria-current="page" routerLink="/inscription">inscriez vous</a></p>
                <p class="mt-3">Acceder au compte utilisateur <a class="nav-link active" aria-current="page" routerLink="/user">ici</a></p>
            </form>
        </div>
    </div>
</main>
